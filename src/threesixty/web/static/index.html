<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>360extract</title>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/app.css">
<style>
  /* The one thing that has to exist before the modules load. */
  .flash {
    position: fixed; left: 50%; bottom: 76px; transform: translateX(-50%);
    display: flex; align-items: center; gap: var(--s3);
    padding: var(--s2) var(--s4);
    background: var(--panel-raised);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-panel);
    box-shadow: 0 8px 28px rgba(0, 0, 0, .5);
    z-index: 40; max-width: 70vw;
  }
  .flash[hidden] { display: none; }
  .flash--error { border-color: var(--error); }
  .flash--warn  { border-color: var(--warning); }
</style>
</head>
<body>

<div id="app">
  <!-- The top bar and pipeline are inserted by app.js so their state lives in one place. -->
  <main class="panel-host" id="panels"></main>
</div>

<div class="flash" id="flash" role="status" aria-live="polite" hidden></div>

<dialog id="system-dialog" aria-labelledby="system-title">
  <div class="dialog__head" id="system-title">System status</div>
  <div class="dialog__body"></div>
  <div class="dialog__foot">
    <button class="btn" type="button" id="system-close">Close</button>
  </div>
</dialog>

<noscript>
  <p style="padding:24px">360extract needs JavaScript enabled.</p>
</noscript>

<script type="module" src="/js/app.js"></script>
</body>
</html>
